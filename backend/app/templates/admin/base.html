<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>{% block title %}Admin{% endblock %} — YouFeed</title>
<link rel="stylesheet" href="/static/css/admin.css?v={{ asset_version('css/admin.css') }}">
</head>
<body>
<header class="ya-header">
    <a class="ya-brand" href="/yf_admin/">YouFeed Admin</a>
    <nav class="ya-nav">
        <a href="/yf_admin/users">Utenti</a>
        <div class="ya-dropdown">
            <button type="button" class="ya-dropdown-toggle" aria-haspopup="true" aria-expanded="false">Topic ▾</button>
            <div class="ya-dropdown-menu" role="menu">
                <a href="/yf_admin/topics">Lista topic</a>
                <a href="/yf_admin/entities">Entità non risolte</a>
                <a href="/yf_admin/rules/ambigui">Ambigui</a>
                <a href="/yf_admin/rules/blacklist">Blacklist</a>
                <a href="/yf_admin/rules/case-sensitive">Case-sensitive</a>
                <a href="/yf_admin/composite">Composite</a>
            </div>
        </div>
        <a href="/yf_admin/sources">Sources</a>
        <a href="/yf_admin/featured">Featured</a>
        <a href="/yf_admin/stats">Stats</a>
        <div class="ya-dropdown">
            <button type="button" class="ya-dropdown-toggle" aria-haspopup="true" aria-expanded="false">Security ▾</button>
            <div class="ya-dropdown-menu" role="menu">
                <a href="/yf_admin/security/blocks">Blocchi country/ASN</a>
                <a href="/yf_admin/security/events">Eventi recenti</a>
                <a href="/yf_admin/security/stats">Aggregati</a>
            </div>
        </div>
        <form action="/yf_admin/articles" method="get" class="ya-quick">
            <input type="number" name="article_id" placeholder="ID articolo" required>
            <button type="submit">→</button>
        </form>
    </nav>
</header>
<main class="ya-main">
    {% block content %}{% endblock %}
</main>
<footer class="ya-footer">
    <small>YouFeed Admin · v1</small>
</footer>
</body>
</html>
