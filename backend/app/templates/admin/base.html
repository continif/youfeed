<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>{% block title %}Admin{% endblock %} — YouFeed</title>
<link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<header class="ya-header">
    <a class="ya-brand" href="/yf_admin/">YouFeed Admin</a>
    <nav class="ya-nav">
        <a href="/yf_admin/users">Utenti</a>
        <a href="/yf_admin/topics">Topic</a>
        <a href="/yf_admin/entities">Entità</a>
        <a href="/yf_admin/sources">Sources</a>
        <a href="/yf_admin/featured">Featured</a>
        <a href="/yf_admin/stats">Stats</a>
        <a href="/yf_admin/rules/ambigui">Ambigui</a>
        <a href="/yf_admin/rules/blacklist">Blacklist</a>
        <a href="/yf_admin/rules/case-sensitive">Case-sensitive</a>
        <a href="/yf_admin/composite">Composite</a>
        <form action="/yf_admin/articles" method="get" class="ya-quick">
            <input type="number" name="article_id" placeholder="ID articolo" required>
            <button type="submit">→</button>
        </form>
    </nav>
</header>
<main class="ya-main">
    {% block content %}{% endblock %}
</main>
<footer class="ya-footer">
    <small>YouFeed Admin · v1</small>
</footer>
</body>
</html>
