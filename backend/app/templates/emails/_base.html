{# Layout base per email transazionali. Inline-friendly, niente JS, design minimale.
   I client email moderni renderizzano il <style>; quelli legacy fallback su default. #}
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="it">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block subject %}YouFeed{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #0f172a; }
    .wrapper { width: 100%; padding: 24px 12px; }
    .card { max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(15,23,42,0.06); }
    .header { padding: 20px 28px; border-bottom: 1px solid #e2e8f0; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #0f172a; }
    .body { padding: 24px 28px; line-height: 1.6; font-size: 15px; }
    .body p { margin: 0 0 12px 0; }
    .button { display: inline-block; padding: 12px 22px; background: #0f172a; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 500; }
    .footer { padding: 16px 28px; font-size: 12px; color: #64748b; text-align: center; border-top: 1px solid #e2e8f0; }
    .small { font-size: 13px; color: #475569; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <h1>{{ site_name }}</h1>
      </div>
      <div class="body">
        {% block body %}{% endblock %}
      </div>
      <div class="footer">
        Questa email è stata inviata da {{ site_name }}.
        Se non hai effettuato tu questa azione, puoi ignorarla.
      </div>
    </div>
  </div>
</body>
</html>
