    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <title>YOUFEED</title>

    <!--
      Theme init: applichiamo la classe "dark" PRIMA del mount Vue per evitare
      un flash di tema sbagliato (FOIT). Lo stesso script va replicato nel
      base.html dei template Jinja, così la coerenza vale anche attraversando
      il confine SPA <-> server-rendered.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("yf_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored === "dark" || (stored !== "light" && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage può essere bloccato; ignoriamo */
        }
      })();
    </script>
  </head>
  <body class="bg-white text-slate-900 antialiased dark:bg-slate-900 dark:text-slate-100">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
