# =============================================================================
# YOUFEED — vhost Apache per SVILUPPO LOCALE
# =============================================================================
#
# Setup una tantum:
#   1) Aggiungi a /etc/hosts:
#        127.0.0.1   www.youfeed.it youfeed.it
#      (in produzione devi commentarlo per vedere il sito vero)
#
#   2) Moduli Apache richiesti:
#        sudo a2enmod rewrite proxy proxy_http proxy_wstunnel headers expires alias
#
#   3) Copia o symlink:
#        sudo ln -s /home/francesco/code/youfeed/infra/apache/001.youfeed.it.conf \
#                   /etc/apache2/sites-available/001.youfeed.it.conf
#        sudo a2ensite 001.youfeed.it
#        sudo systemctl reload apache2
#
# Esecuzione tipica in dev (3 shell):
#   - shell A: docker-compose up -d              (Postgres + Redis + Manticore)
#   - shell B: cd backend && uvicorn app.main:app --reload --port 8000
#   - shell C: cd frontend && npm run dev        (Vite su :5173)
#
# Routing:
#   /yf_*, /sitemap.xml, /robots.txt           → FastAPI :8000
#   /images/*                                  → filesystem ./data/images
#   WS upgrade                                 → Vite :5173 (HMR)
#   /@vite, /@id, /@fs, /src, /node_modules    → Vite :5173 (asset dev)
#   /login, /register, /verify-email,
#     /forgot-password, /reset-password,
#     /oauth-callback, /search, /me/*          → Vite :5173 (SPA HMR)
#   /favicon.*, /manifest.json, /sw.js         → Vite :5173
#   /, /about, /privacy, /terms, /{username}/* → FastAPI :8000 (Jinja public)
#
# Se Vite non è up vedrai 502 sui path SPA — è normale.
# =============================================================================

<VirtualHost *:80>
    ServerName www.youfeed.it
    ServerAlias youfeed.it
    ServerAdmin info@youfeed.it
    SetEnv YF_ENV development

    # In dev il "DocumentRoot" è solo un fallback formale: Apache non serve mai
    # file statici da qui (gli asset vengono dal proxy Vite). Lo puntiamo alla
    # build di produzione, così se per caso si fa `npm run build` può servire.
    DocumentRoot /home/francesco/code/youfeed/frontend/dist

    # ---- Logs (rotazione giornaliera, file in repo locale) ----
    CustomLog "|/usr/bin/rotatelogs /home/francesco/code/youfeed/logs/access.%Y-%m-%d.log 86400" combined env=!image
    ErrorLog  "|/usr/bin/rotatelogs /home/francesco/code/youfeed/logs/error.%Y-%m-%d.log 86400"
    LogLevel warn

    # ---- Header sicurezza base ----
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ---- Cache statici (utile solo per build di prod, no effetto su proxy Vite) ----
    ExpiresActive on
    ExpiresByType image/png             "access plus 6 month"
    ExpiresByType image/gif             "access plus 6 month"
    ExpiresByType image/jpeg            "access plus 6 month"
    ExpiresByType image/webp            "access plus 6 month"
    ExpiresByType image/x-icon          "access plus 6 month"
    ExpiresByType image/svg+xml         "access plus 6 month"
    ExpiresByType text/javascript       "access plus 6 month"
    ExpiresByType application/javascript "access plus 6 month"
    ExpiresByType text/css              "access plus 6 month"
    ExpiresByType font/woff2            "access plus 1 year"

    <Directory /home/francesco/code/youfeed/frontend/dist>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
    </Directory>

    # ---- Immagini articoli (filesystem locale dev) ----
    Alias /images /home/francesco/code/youfeed/data/images
    <Directory /home/francesco/code/youfeed/data/images>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
        AddType image/webp .webp
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # ===========================================================================
    # Backend FastAPI (porta 8000) — API JSON + Jinja public dispatcher
    # ===========================================================================
    ProxyPreserveHost On
    ProxyTimeout      30

    ProxyPass        /yf_         http://127.0.0.1:8000/yf_
    ProxyPassReverse /yf_         http://127.0.0.1:8000/yf_

    ProxyPass        /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPassReverse /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPass        /robots.txt  http://127.0.0.1:8000/robots.txt
    ProxyPassReverse /robots.txt  http://127.0.0.1:8000/robots.txt

    # ===========================================================================
    # Vite dev server (porta 5173) — HMR + asset + SPA paths
    # ===========================================================================

    # WebSocket di HMR (Vite emette su `/` con header Upgrade: websocket)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:5173/$1 [P,L]

    # Asset Vite generati a dev-time
    ProxyPass        /@vite/         http://127.0.0.1:5173/@vite/
    ProxyPassReverse /@vite/         http://127.0.0.1:5173/@vite/
    ProxyPass        /@id/           http://127.0.0.1:5173/@id/
    ProxyPassReverse /@id/           http://127.0.0.1:5173/@id/
    ProxyPass        /@fs/           http://127.0.0.1:5173/@fs/
    ProxyPassReverse /@fs/           http://127.0.0.1:5173/@fs/
    ProxyPass        /@react-refresh http://127.0.0.1:5173/@react-refresh
    ProxyPassReverse /@react-refresh http://127.0.0.1:5173/@react-refresh
    ProxyPass        /src/           http://127.0.0.1:5173/src/
    ProxyPassReverse /src/           http://127.0.0.1:5173/src/
    ProxyPass        /node_modules/  http://127.0.0.1:5173/node_modules/
    ProxyPassReverse /node_modules/  http://127.0.0.1:5173/node_modules/

    # File statici servoti dall'index.html della SPA
    ProxyPass        /favicon.ico    http://127.0.0.1:5173/favicon.ico
    ProxyPassReverse /favicon.ico    http://127.0.0.1:5173/favicon.ico
    ProxyPass        /favicon.svg    http://127.0.0.1:5173/favicon.svg
    ProxyPassReverse /favicon.svg    http://127.0.0.1:5173/favicon.svg
    ProxyPass        /manifest.json  http://127.0.0.1:5173/manifest.json
    ProxyPassReverse /manifest.json  http://127.0.0.1:5173/manifest.json
    ProxyPass        /sw.js          http://127.0.0.1:5173/sw.js
    ProxyPassReverse /sw.js          http://127.0.0.1:5173/sw.js

    # SPA paths — Vite di default fa fallback su index.html quando il path non
    # combacia con un file statico, quindi il client-side router (vue-router)
    # gestisce la rotta correttamente.
    ProxyPass        /login            http://127.0.0.1:5173/login
    ProxyPassReverse /login            http://127.0.0.1:5173/login
    ProxyPass        /register         http://127.0.0.1:5173/register
    ProxyPassReverse /register         http://127.0.0.1:5173/register
    ProxyPass        /verify-email     http://127.0.0.1:5173/verify-email
    ProxyPassReverse /verify-email     http://127.0.0.1:5173/verify-email
    ProxyPass        /forgot-password  http://127.0.0.1:5173/forgot-password
    ProxyPassReverse /forgot-password  http://127.0.0.1:5173/forgot-password
    ProxyPass        /reset-password   http://127.0.0.1:5173/reset-password
    ProxyPassReverse /reset-password   http://127.0.0.1:5173/reset-password
    ProxyPass        /oauth-callback   http://127.0.0.1:5173/oauth-callback
    ProxyPassReverse /oauth-callback   http://127.0.0.1:5173/oauth-callback
    ProxyPass        /search           http://127.0.0.1:5173/search
    ProxyPassReverse /search           http://127.0.0.1:5173/search

    # /me e tutti i sotto-path /me/...
    ProxyPass        /me/              http://127.0.0.1:5173/me/
    ProxyPassReverse /me/              http://127.0.0.1:5173/me/
    ProxyPass        /me               http://127.0.0.1:5173/me
    ProxyPassReverse /me               http://127.0.0.1:5173/me

    # ===========================================================================
    # Catch-all → FastAPI Jinja (home pubblica + /{username}/...)
    # Questa MUST essere l'ultima ProxyPass.
    # ===========================================================================
    ProxyPass        /  http://127.0.0.1:8000/
    ProxyPassReverse /  http://127.0.0.1:8000/
</VirtualHost>
