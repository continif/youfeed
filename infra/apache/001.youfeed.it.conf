# =============================================================================
# YOUFEED — vhost Apache per SVILUPPO LOCALE
# =============================================================================
#
# Setup una tantum:
#   1) Aggiungi a /etc/hosts:
#        127.0.0.1   www.youfeed.it youfeed.it
#      (in produzione devi commentarlo per vedere il sito vero)
#
#   2) Moduli Apache richiesti:
#        sudo a2enmod rewrite proxy proxy_http headers expires alias
#
#   3) Copia il file (NON symlink: il repo sta sotto /home/$USER, www-data
#      non ci entra → reload Apache fallirebbe). Ad ogni modifica del vhost,
#      ricopiare e ricaricare:
#        sudo cp /home/francesco/code/youfeed/infra/apache/001.youfeed.it.conf \
#                /etc/apache2/sites-available/001.youfeed.it.conf
#        sudo a2ensite 001.youfeed.it
#        sudo systemctl reload apache2
#
# Modalità di default (questa configurazione):
#   Apache serve la build SPA da `frontend/dist/` (statica). Niente Vite. Per
#   aggiornare la SPA: `cd frontend && npm run build`. Per il backend basta
#   `uvicorn app.main:app --reload --port 8000` come al solito.
#
# Modalità HMR (opzionale, se devi iterare sul frontend):
#   - shell A: docker-compose up -d              (Postgres + Redis + Manticore)
#   - shell B: cd backend && uvicorn app.main:app --reload --port 8000
#   - shell C: cd frontend && npm run dev        (Vite su :5173)
#   In modalità HMR vai DIRETTO su http://localhost:5173/ — lì Vite proxa
#   /yf_* a 127.0.0.1:8000 (vedi vite.config.ts), quindi non serve passare da
#   Apache. Mantenere così evita la complessità di un fallback dinamico
#   "Vite up? proxy : static".
#
# Routing di questo vhost:
#   /yf_*, /sitemap.xml, /robots.txt           → FastAPI :8000
#   /images/*                                  → filesystem ./data/images
#   /assets/*                                  → frontend/dist/assets
#   /static/*                                  → frontend/dist/static  (futuro)
#   /favicon.* /manifest.json /sw.js           → frontend/dist (se presenti)
#   /login /register /verify-email
#     /forgot-password /reset-password
#     /oauth-callback /search /me /me/*        → frontend/dist/index.html (SPA)
#   /, /{username}/...                         → FastAPI :8000 (Jinja public)
# =============================================================================

<VirtualHost *:80>
    ServerName www.youfeed.it
    ServerAlias youfeed.it
    ServerAdmin info@youfeed.it
    SetEnv YF_ENV development

    DocumentRoot /home/francesco/code/youfeed/frontend/dist

    # ---- Logs (rotazione giornaliera, file in repo locale) ----
    CustomLog "|/usr/bin/rotatelogs /home/francesco/code/youfeed/logs/access.%Y-%m-%d.log 86400" combined env=!image
    ErrorLog  "|/usr/bin/rotatelogs /home/francesco/code/youfeed/logs/error.%Y-%m-%d.log 86400"
    LogLevel warn

    # ---- Header sicurezza base ----
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ---- Cache statici (bundle SPA Vite hash-named → immutable) ----
    ExpiresActive on
    ExpiresByType image/png             "access plus 6 month"
    ExpiresByType image/gif             "access plus 6 month"
    ExpiresByType image/jpeg            "access plus 6 month"
    ExpiresByType image/webp            "access plus 6 month"
    ExpiresByType image/x-icon          "access plus 6 month"
    ExpiresByType image/svg+xml         "access plus 6 month"
    ExpiresByType text/javascript       "access plus 6 month"
    ExpiresByType application/javascript "access plus 6 month"
    ExpiresByType text/css              "access plus 6 month"
    ExpiresByType font/woff2            "access plus 1 year"

    # ---- Frontend build (SPA Vue) ----
    <Directory /home/francesco/code/youfeed/frontend/dist>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
        # Vite emette /assets/*.{hash}.js → cache aggressiva
        <FilesMatch "\.(js|css|woff2?|svg|png|jpg|webp|avif|ico)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
    </Directory>

    Alias /assets /home/francesco/code/youfeed/frontend/dist/assets

    # /static è il CSS/JS dei template Jinja public (sta nel backend, non nel
    # frontend/dist — niente di Vite). Il backend monta lo stesso path su
    # FastAPI StaticFiles, ma servirlo da Apache evita un proxy hop.
    Alias /static /home/francesco/code/youfeed/backend/app/static
    <Directory /home/francesco/code/youfeed/backend/app/static>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
    </Directory>

    # ---- Immagini articoli (filesystem locale dev) ----
    Alias /images /home/francesco/code/youfeed/data/images
    <Directory /home/francesco/code/youfeed/data/images>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
        AddType image/webp .webp
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # ===========================================================================
    # Backend FastAPI (porta 8000) — API JSON + Jinja public dispatcher + sitemap
    # ===========================================================================
    ProxyPreserveHost On
    ProxyTimeout      30

    ProxyPass        /yf_         http://127.0.0.1:8000/yf_
    ProxyPassReverse /yf_         http://127.0.0.1:8000/yf_

    ProxyPass        /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPassReverse /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPass        /robots.txt  http://127.0.0.1:8000/robots.txt
    ProxyPassReverse /robots.txt  http://127.0.0.1:8000/robots.txt

    # ===========================================================================
    # SPA fallback: i path SPA mappano a /index.html, vue-router fa il resto.
    # ===========================================================================
    RewriteEngine On

    # File esistente sul disco (es. /assets/foo.js, /favicon.svg) → servi così
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    # SPA route prefixes — devono restare allineati con
    # frontend/src/router/index.ts e Claude/reserved-words.txt
    # (questi nomi sono riservati come username dal dispatcher backend)
    RewriteRule ^/(login|register|verify-email|forgot-password|reset-password|oauth-callback|search)(/.*)?$ /index.html [L]
    RewriteRule ^/me(/.*)?$ /index.html [L]

    # ===========================================================================
    # Catch-all → FastAPI Jinja (home pubblica + /{username}/...)
    # MUST essere l'ultima ProxyPass.
    #
    # Esclusioni: in Apache 2.4, ProxyPass è valutato PRIMA degli Alias e delle
    # RewriteRule non-[P] in cui dipendiamo per il fallback SPA su index.html.
    # Quindi senza queste `!` il catch-all si mangia /assets/*, /static/*,
    # /favicon.*, /manifest.json, /sw.js, /index.html prima che il filesystem
    # abbia chance di servirli.
    # ===========================================================================
    ProxyPass        /assets        !
    ProxyPass        /static        !
    ProxyPass        /images        !
    ProxyPass        /favicon.ico   !
    ProxyPass        /favicon.svg   !
    ProxyPass        /manifest.json !
    ProxyPass        /sw.js         !
    ProxyPass        /index.html    !

    ProxyPass        /  http://127.0.0.1:8000/
    ProxyPassReverse /  http://127.0.0.1:8000/
</VirtualHost>
