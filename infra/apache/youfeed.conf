# /etc/apache2/sites-available/youfeed.conf
#
# Vhost YOUFEED. Cloudflare termina TLS e proxy verso questo Apache (HTTP
# in LAN o HTTPS reale a piacere). Apache fa il routing fra:
#   - /yf_*     → FastAPI Uvicorn (API JSON)
#   - /static/* → build Vue (frontend/dist/static)
#   - /assets/* → idem
#   - /images/* → filesystem locale (immagini articoli)
#   - SPA paths → index.html della build Vue (rewrite + Vue Router lato client)
#   - tutto il resto → FastAPI (Jinja2 dispatcher pubblico)

<VirtualHost *:80>
    ServerName www.youfeed.it
    ServerAlias youfeed.it
    DocumentRoot /opt/youfeed/frontend/dist

    ErrorLog ${APACHE_LOG_DIR}/youfeed-error.log
    CustomLog ${APACHE_LOG_DIR}/youfeed-access.log combined

    # ---- Static frontend assets ----
    Alias /static /opt/youfeed/frontend/dist/static
    Alias /assets /opt/youfeed/frontend/dist/assets
    <Directory /opt/youfeed/frontend/dist>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        # Cache aggressiva per asset con hash nel filename (Vite emette /assets/*.{hash}.js)
        <FilesMatch "\.(js|css|woff2?|svg|png|jpg|webp|avif|ico)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
    </Directory>

    # ---- Immagini articoli ----
    Alias /images /var/lib/youfeed/images
    <Directory /var/lib/youfeed/images>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        AddType image/webp .webp
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # ---- file di sistema ----
    Alias /favicon.ico /opt/youfeed/frontend/dist/favicon.ico
    Alias /manifest.json /opt/youfeed/frontend/dist/manifest.json
    Alias /sw.js /opt/youfeed/frontend/dist/sw.js

    # ---- Backend API (/yf_*) ----
    ProxyPreserveHost On
    ProxyPass         /yf_ http://127.0.0.1:8000/yf_
    ProxyPassReverse  /yf_ http://127.0.0.1:8000/yf_

    # ---- Sitemap & robots → backend (dinamici per parte) ----
    ProxyPass         /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPassReverse  /sitemap.xml http://127.0.0.1:8000/sitemap.xml
    ProxyPass         /robots.txt  http://127.0.0.1:8000/robots.txt
    ProxyPassReverse  /robots.txt  http://127.0.0.1:8000/robots.txt

    # ---- SPA paths: rewrite a index.html, Vue Router fa il resto ----
    RewriteEngine On
    # Lascia passare le richieste a file/dir esistenti sul disco
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    # SPA route prefixes (devono restare allineati con frontend/src/router/index.ts
    # e con Claude/reserved-words.txt — questi nomi sono riservati come username)
    RewriteRule ^/(login|register|verify-email|forgot-password|reset-password|oauth-callback|search)(/.*)?$ /index.html [L]
    RewriteRule ^/me(/.*)?$ /index.html [L]

    # ---- Tutto il resto → backend FastAPI Jinja (dispatcher pubblico) ----
    # Include /{username}, /{username}/topic/..., /{username}/cat/.../rss, ecc.
    ProxyPass         / http://127.0.0.1:8000/
    ProxyPassReverse  / http://127.0.0.1:8000/

    # Headers di sicurezza base (Cloudflare può duplicarne alcuni — adattare)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "interest-cohort=(), browsing-topics=()"
</VirtualHost>
