## Manticore Search — configurazione YOUFEED
## Riferimento: https://manual.manticoresearch.com/

searchd {
    listen = 9306:mysql
    listen = 9308:http
    log = /var/log/manticore/searchd.log
    query_log = /var/log/manticore/query.log
    query_log_format = sphinxql
    pid_file = /var/run/manticore/searchd.pid
    # NB: in Manticore 25+ `data_dir` (modalità RT auto-schema) NON può
    # coesistere con dichiarazioni `table {}` esplicite — il daemon fallisce
    # con FATAL all'avvio. Usiamo dichiarazioni esplicite (vedi sotto), quindi
    # niente data_dir. Il path delle tabelle RT è impostato per ciascuna.
    network_timeout = 5
    binlog_path = /var/lib/manticore/binlog
}

## Indice RT articoli — vedi Claude/DATABASE.md.
## NB: per l'italiano Manticore non offre lemmatize_*_all. Usiamo libstemmer_it
## + wordforms file per le irregolarità più frequenti. In v1.2 il content_text
## verrà pre-lemmatizzato lato app con spaCy, allora si potrà ridurre la
## morphology a libstemmer_it residuale.

table articles_rt {
    type = rt
    path = /var/lib/manticore/articles_rt

    rt_field = title
    rt_field = description
    rt_field = content_text
    rt_attr_string = content_html

    rt_attr_bigint = source_id
    rt_attr_string = source_domain
    rt_attr_multi = topic_ids
    rt_attr_string = topic_slugs_csv
    rt_attr_timestamp = published_at
    rt_attr_string = kind

    morphology = libstemmer_it
    min_word_len = 2
    charset_table = non_cjk
    blend_chars = +, &, U+27       # mantiene "M&M", "L'Aquila", token con apostrofo
    wordforms = /usr/share/manticore/wordforms/italian_wordforms.txt
    stopwords = /usr/share/manticore/stopwords/italian_stopwords.txt
    index_exact_words = 1
    expand_keywords = 1
}
